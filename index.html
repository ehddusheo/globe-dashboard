<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Industry Intelligence Platform</title>
    <link rel="stylesheet" href="styles.css?v=20260309c">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-screen">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <div class="loader-text">GLOBAL DATABASE INITIALIZING</div>
            <div class="loader-sub">Connecting to global database...</div>
            <div class="loader-bar"><div class="loader-bar-fill"></div></div>
        </div>
    </div>

    <div id="app" style="opacity:0">
        <header id="header">
            <div class="header-left">
                <span class="logo-icon">&#127760;</span>
                <h1>GLOBAL INDUSTRY <span class="accent">INTELLIGENCE</span></h1>
            </div>
            <div class="header-stats">
                <div class="stat-item"><span class="stat-value" data-target="195">0</span><span class="stat-label">COUNTRIES</span></div>
                <div class="stat-item"><span class="stat-value" data-target="12">0</span><span class="stat-label">INDUSTRIES</span></div>
                <div class="stat-item"><span class="stat-value" data-target="2340">0</span><span class="stat-label">DATA POINTS</span></div>
                <div class="stat-item"><span class="stat-value" data-target="104">0</span><span class="stat-label">TRILLION USD</span></div>
            </div>
            <div class="header-right">
                <button id="api-key-btn" class="api-key-btn" title="API Key 설정">🔑</button>
                <div class="live-dot"><span class="dot"></span>LIVE</div>
                <div id="clock"></div>
            </div>
        </header>

        <main id="main-content">
            <aside id="left-panel" class="glass-panel">
                <div class="panel-section">
                    <h2 class="section-title">&#128269; 국가 선택</h2>
                    <input type="text" id="country-search" class="search-input" placeholder="국가 검색..." autocomplete="off">
                    <div id="search-results" class="search-results"></div>
                    <select id="country-select" class="styled-select">
                        <option value="">-- 국가를 선택하세요 --</option>
                    </select>
                </div>
                <div class="panel-section">
                    <h2 class="section-title">&#128188; 업종 선택</h2>
                    <div id="industry-grid" class="industry-grid"></div>
                </div>
                <div id="quick-stats" class="quick-stats"></div>
            </aside>

            <div id="globe-container"></div>

            <aside id="right-panel" class="glass-panel hidden">
                <button id="close-panel" class="close-btn">&times;</button>
                <div id="data-content"></div>
            </aside>
        </main>

        <!-- Expansion Advisor CTA -->
        <button id="expansion-cta" class="expansion-cta-btn">
            <span class="cta-icon">🚀</span>
            <span class="cta-text">AI 수출전략 분석</span>
            <span class="cta-glow"></span>
        </button>

        <!-- Wizard Modal -->
        <div id="expansion-wizard" class="expansion-wizard hidden">
            <div class="wizard-backdrop"></div>
            <div class="wizard-modal glass-panel">
                <button class="close-btn wizard-close" id="wizard-close-btn">&times;</button>
                <div class="wizard-steps" id="wizard-steps"></div>
                <div class="wizard-content" id="wizard-content"></div>
                <div class="wizard-nav">
                    <button class="wizard-btn prev hidden" id="wizard-prev">← 이전</button>
                    <button class="wizard-btn next" id="wizard-next">다음 →</button>
                </div>
            </div>
        </div>

        <!-- Analysis Overlay -->
        <div id="analysis-overlay" class="analysis-overlay hidden">
            <div class="analysis-hud">
                <div class="analysis-status" id="analysis-status">글로벌 데이터베이스 연결중...</div>
                <div class="analysis-progress">
                    <div class="analysis-bar"><div class="analysis-bar-fill" id="analysis-bar"></div></div>
                    <div class="analysis-count" id="analysis-count">0 / 149</div>
                </div>
            </div>
        </div>

        <!-- Expansion Report Panel -->
        <aside id="expansion-report" class="glass-panel expansion-panel hidden">
            <button class="close-btn" id="close-expansion">&times;</button>
            <div id="expansion-content"></div>
        </aside>

        <!-- API Key Modal -->
        <div id="api-key-modal" class="api-key-modal hidden">
            <div class="api-key-backdrop"></div>
            <div class="api-key-dialog glass-panel">
                <button class="close-btn" id="api-key-close">&times;</button>
                <h2 class="api-key-title">🔑 Gemini API Key 설정</h2>
                <p class="api-key-desc">Google AI Studio에서 발급받은 API Key를 입력하세요.<br>
                    <a href="https://aistudio.google.com/apikey" target="_blank" class="api-key-link">→ Google AI Studio에서 키 발급받기</a>
                </p>
                <div class="api-key-input-wrap">
                    <input type="password" id="api-key-input" class="api-key-input" placeholder="AIzaSy...">
                    <button id="api-key-toggle" class="api-key-toggle">👁</button>
                </div>
                <div id="api-key-status" class="api-key-status"></div>
                <button id="api-key-save" class="wizard-btn next api-key-save">저장 및 적용</button>
            </div>
        </div>

        <footer id="ticker">
            <div class="ticker-wrap">
                <div class="ticker-content" id="ticker-content"></div>
            </div>
        </footer>
    </div>

    <script src="https://unpkg.com/globe.gl@2.27.2/dist/globe.gl.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <script src="data.js"></script>
    <script src="app.js?v=20260309f"></script>
</body>
</html>
