name: Daily Data Update

on:
  schedule:
    - cron: '0 21 * * *'  # 매일 한국시간 오전 6시 (UTC 21시)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run data pipeline
        run: python scripts/run_all.py

      - name: Commit and push updated data
        run: |
          git config user.name "Globe Data Bot"
          git config user.email "globe-bot@users.noreply.github.com"
          git add data.js raw_data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Daily data update $(date +%Y-%m-%d)"
            git push
          fi
